<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Facility - Carlos Thomas Acosta</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        #instruction { position: absolute; top: 10%; width: 100%; text-align: center; color: #ffaa00; font-size: 1.2rem; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.4); font-size: 20px; }
        
        /* Estilo de la imagen: Inventario y Salud */
        .hud-box { position: absolute; background: rgba(0,0,0,0.7); border: 1px solid #444; color: #eee; padding: 10px; font-size: 0.9rem; }
        #inventory { bottom: 15%; left: 2%; width: 150px; }
        #stats { bottom: 5%; left: 2%; width: 150px; }
        #timer { top: 2%; right: 2%; color: white; font-size: 1.2rem; }

        #keypad-ui {
            display: none; position: absolute; top: 50%; left: 50%; pointer-events: all;
            transform: translate(-50%, -50%); background: rgba(10, 10, 10, 0.98);
            padding: 25px; border: 1px solid #444; text-align: center;
        }
        #display { background: #000; color: #0f0; padding: 15px; margin-bottom: 15px; font-size: 22px; border: 1px solid #0f0; height: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 15px; font-size: 18px; cursor: pointer; background: #222; color: white; border: 1px solid #444; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="instruction">Presiona 'E' para interactuar</div>
        <div id="crosshair">+</div>
        <div id="timer">TIEMPO RESTANTE: 14:59</div>
        <div id="inventory" class="hud-box">INVENTARIO:<br>[Linterna]<br>[Batería]</div>
        <div id="stats" class="hud-box">SALUD: ■■■□□<br>ESTAMINA: ■■</div>
    </div>

    <div id="keypad-ui">
        <div id="display"></div>
        <div class="grid">
            <button onclick="addNum('1')">1</button><button onclick="addNum('2')">2</button><button onclick="addNum('3')">3</button>
            <button onclick="addNum('4')">4</button><button onclick="addNum('5')">5</button><button onclick="addNum('6')">6</button>
            <button onclick="addNum('7')">7</button><button onclick="addNum('8')">8</button><button onclick="addNum('9')">9</button>
            <button style="background:#400" onclick="closeKeypad()">X</button><button onclick="addNum('0')">0</button>
            <button style="background:#040" onclick="checkCode()">OK</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
    <script>
        let currentInput = "";
        const correctCode = "031223";
        window.addNum = (n) => { if(currentInput.length < 6) { currentInput += n; document.getElementById('display').innerText = currentInput; } };
        window.closeKeypad = () => { document.getElementById('keypad-ui').style.display = 'none'; currentInput = ""; document.body.requestPointerLock(); };
        window.checkCode = () => {
            if(currentInput === correctCode) {
                window.dispatchEvent(new CustomEvent('openBlindDoor'));
                closeKeypad();
            } else { currentInput = ""; }
        };
    </script>
</body>
</html>
