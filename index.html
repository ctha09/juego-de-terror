<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horror Room - Carlos Thomas Acosta</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #instruction {
            position: absolute; top: 15%; width: 100%; text-align: center;
            color: white; font-size: 1.2rem; pointer-events: none; text-shadow: 2px 2px 4px #000;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.7); font-size: 24px; pointer-events: none;
        }
        #click-to-start {
            position: absolute; bottom: 5%; width: 100%; text-align: center;
            color: #ff4400; font-size: 0.9rem; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="instruction">Busca la linterna para empezar</div>
    <div id="crosshair">+</div>
    <div id="click-to-start">HAZ CLIC PARA ENTRAR</div>
    <script type="module" src="main.js"></script>
</body>
</html>
